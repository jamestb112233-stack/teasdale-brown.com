<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>teasdale-brown.com</title>
  <meta name="description" content="teasdale-brown.com landing page placeholder" />
  <style>
    :root{
      --bg:#0f172a;
      --panel:rgba(255,255,255,0.08);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,0.14);
      --accent:#94a3b8;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.08), transparent 25%),
        linear-gradient(135deg, #111827 0%, #0f172a 45%, #1e293b 100%);
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(760px, 100%);
      padding:40px 32px;
      border:1px solid var(--line);
      border-radius:24px;
      background:var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align:center;
    }
    .eyebrow{
      display:inline-block;
      padding:8px 14px;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:22px;
    }
    h1{
      margin:0 0 12px;
      font-size:clamp(2rem, 5vw, 4rem);
      line-height:1.05;
      letter-spacing:-0.03em;
    }
    p{
      margin:0 auto;
      max-width:42rem;
      font-size:clamp(1rem, 2vw, 1.15rem);
      line-height:1.65;
      color:var(--muted);
    }
    .divider{
      width:84px;
      height:1px;
      background:var(--accent);
      margin:28px auto 22px;
      opacity:.65;
    }
    .footer{
      margin-top:26px;
      font-size:.92rem;
      color:var(--muted);
      opacity:.9;
    }
    code{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:.95em;
      color:#e2e8f0;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Coming Soon</div>
    <h1>teasdale-brown.com</h1>
    <p>
      This domain is active and a new website is being prepared.
      Please check back soon for updates.
    </p>
    <div class="divider"></div>
    <p class="footer">
      Placeholder landing page for <code>teasdale-brown.com</code>
    </p>
  </main>
</body>
</html>
